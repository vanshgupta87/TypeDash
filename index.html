<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Dash | Professional Typing Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/logo.png">
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <div class="logo">TYPE DASH</div>
        <div class="controls">
    <div class="control-group">
        <button class="btn-toggle" onclick="window.location.href='/game/game.html'" style="border-color: rgba(255,255,255,0.3); color: #fff; background: linear-gradient(45deg, rgba(255,255,255,0.1), transparent);">
            ⚔️ Duel Mode
        </button>
    </div>
            <div class="control-group" id="time-selector">
                <button class="btn-toggle" data-val="15">15</button>
                <button class="btn-toggle active" data-val="30">30</button>
                <button class="btn-toggle" data-val="60">60</button>
            </div>
            <div class="control-group" id="mode-selector">
                <button class="btn-toggle active" data-mode="easy">Easy</button>
                <button class="btn-toggle" data-mode="medium">Medium</button>
                <button class="btn-toggle" data-mode="hard">Hard</button>
            </div>
        </div>
    </nav>

    <div class="profile-trigger" onclick="toggleProfile()">
        <div class="avatar-circle" id="nav-avatar">G</div>
        <span id="nav-username" style="font-size: 0.8rem; font-weight: 500;">Guest</span>
    </div>

    <main class="workspace">
        <div class="typing-card">
            <div id="display-text"></div>
            <input type="text" id="hidden-input" autofocus autocomplete="off">
            
            <div class="stats-footer">
                <div class="stat-item">
                    <span class="stat-val" id="timer">30</span>
                    <span class="stat-lbl">Time Left (s)</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="wpm">0</span>
                    <span class="stat-lbl">Words / Min</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val"><span id="accuracy">100</span>%</span>
                    <span class="stat-lbl">Accuracy Rating</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div>&copy; Type Dash | Professional Typing Suite</div>
        <div class="footer-right">
            <a href="https://github.com/vanshgupta87/TypeDash" class="footer-link">Github</a>
            <a href="https://www.linkedin.com/in/vansh-gupta-423a01361/" class="footer-link">LinkedIn</a>
            <a href="https://imvansh.vercel.app/contact/contact.html" class="footer-link">Contact</a>
        </div>
    </footer>

    <div id="results-modal">
        <div class="modal-card">
            <span class="stat-lbl">Session Metrics</span>
            <h2 id="final-wpm">0 WPM</h2>
            <p id="final-acc" style="color: #666">Accuracy: 0%</p>
            <button class="btn-main" onclick="closeModal()">Close & Restart</button>
        </div>
    </div>

    <div id="profile-overlay" onclick="if(event.target === this) toggleProfile()">
        <div class="profile-card">
            <div class="avatar-circle" style="width: 60px; height: 60px; margin: 0 auto 1rem; font-size: 1.5rem;" id="card-avatar">G</div>
            <input type="text" class="name-edit" id="username-input" value="Guest User" maxlength="15" oninput="updateName(this.value)">
            
            <div class="p-stat-row">
                <div class="p-stat-box">
                    <span class="p-stat-val" id="prof-wpm">0</span>
                    <span class="p-stat-lbl">Live WPM</span>
                </div>
                <div class="p-stat-box">
                    <span class="p-stat-val" id="prof-acc">100%</span>
                    <span class="p-stat-lbl">Live Acc</span>
                </div>
            </div>
            <p style="font-size: 0.7rem; color: #444; margin-top: 2rem; cursor: pointer;" onclick="toggleProfile()">CLICK ANYWHERE TO CLOSE</p>
        </div>
    </div>
</body>
<script src="home.js"></script>

</html>
