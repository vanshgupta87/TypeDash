<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Dash | Pro Duel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="icon" type="image/x-icon" href="/logo.png">
    <link rel="stylesheet" href="game.css">
</head>
<body class="p1-active">

    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <div class="logo">TYPE DASH</div>
        
        <div class="controls">
            <div class="control-group">
                <button class="btn-toggle" onclick="window.location.href='/home.html'" style="border-color: rgba(255,255,255,0.2); color: #fff;">
                    🏠 Practice Mode
                </button>
                </div>

            <div class="control-group" id="time-selector">
                <button class="btn-toggle" data-val="15">15</button>
                <button class="btn-toggle active" data-val="30">30</button>
                <button class="btn-toggle" data-val="60">60</button>
            </div>

            <div class="control-group" id="mode-selector">
                <button class="btn-toggle active" data-mode="easy">Easy</button>
                <button class="btn-toggle" data-mode="medium">Medium</button>
                <button class="btn-toggle" data-mode="hard">Hard</button>
            </div>
        </div>

        <div class="profile-trigger">
            <div class="avatar-circle">VS</div>
            <span id="current-player-name" style="font-size: 0.8rem; font-weight: 500;">Duel Session</span>
        </div>
    </nav>

    <div id="setup-modal" class="modal">
        <div class="modal-card">
            <span style="font-size: 0.6rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Initialize Battle</span>
            <div style="margin-top: 2rem;">
                <input type="text" id="p1-name" class="name-input" placeholder="Player 1 Name" value="Player 1">
                <input type="text" id="p2-name" class="name-input" placeholder="Player 2 Name" value="Player 2">
            </div>
            <button class="btn-main" onclick="startDuel()">Start Session</button>
        </div>
    </div>

    <main class="workspace">
        <div class="turn-label" id="turn-display">PLAYER 1 TURN</div>
        
        <div id="display-text"></div>
        <input type="text" id="hidden-input" autofocus autocomplete="off">

        <div class="stats-footer">
            <div class="stat-item">
                <span class="stat-val" id="timer">30</span>
                <span class="stat-lbl">Time Left (s)</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="wpm">0</span>
                <span class="stat-lbl">Words / Min</span>
            </div>
            <div class="stat-item">
                <span class="stat-val"><span id="accuracy">100</span>%</span>
                <span class="stat-lbl">Accuracy Rating</span>
            </div>
        </div>
    </main>

    <div id="results-modal" class="modal" style="display: none;">
        <div class="modal-card" style="width: 550px;">
            <span style="font-size: 0.6rem; color: #666; letter-spacing: 3px; text-transform: uppercase;">Match Finalized</span>
            <h2 id="winner-text" style="font-size: 4rem; margin: 1rem 0; font-weight: 300;">P1 Wins!</h2>
            
            <div style="display: flex; gap: 20px; margin-bottom: 2rem;">
                <div style="flex: 1; padding: 20px; border: 1px solid var(--border); border-radius: 4px; background: rgba(255,255,255,0.02);">
                    <div id="res-name-p1" style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;">P1</div>
                    <div id="res-wpm-p1" style="font-size: 2.5rem; color: var(--p1-theme);">0</div>
                    <div style="font-size: 0.5rem; color: #444;">WPM</div>
                </div>
                <div style="flex: 1; padding: 20px; border: 1px solid var(--border); border-radius: 4px; background: rgba(255,255,255,0.02);">
                    <div id="res-name-p2" style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;">P2</div>
                    <div id="res-wpm-p2" style="font-size: 2.5rem; color: var(--p2-theme);">0</div>
                    <div style="font-size: 0.5rem; color: #444;">WPM</div>
                </div>
            </div>
            
            <button class="btn-main" onclick="location.reload()">Reset Duel</button>
        </div>
    </div>

    <footer class="site-footer">
    <div class="footer-left">
        &copy; 2026 Type Dash | Professional Typing Suite
    </div>
    <div class="footer-right">
        <a href="https://github.com/vanshgupta87/Type-Dash" class="footer-link">Github</a>
            <a href="https://www.linkedin.com/in/vansh-gupta-423a01361/" class="footer-link">LinkedIn</a>
            <a href="https://imvansh.vercel.app/contact/contact.html" class="footer-link">Contact</a>
    </div>
</footer>
</body>
<script src="game.js"></script>
</html>
